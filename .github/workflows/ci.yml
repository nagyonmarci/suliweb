name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '25'
  NODE_VERSION: '22'

jobs:
  # ── Backend Tests + Coverage ────────────────────────────────────────────────
  backend-test:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests with JaCoCo
        run: mvn -B test jacoco:report
        env:
          JWT_SECRET: ci-test-secret-not-real-placeholder-for-testing-only

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

  # ── Frontend Lint + Build ────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── SAST: SpotBugs ──────────────────────────────────────────────────────────
  sast-spotbugs:
    name: SAST - SpotBugs
    runs-on: ubuntu-latest
    needs: backend-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run SpotBugs
        run: mvn -B spotbugs:spotbugs -DskipTests
        continue-on-error: true
        env:
          JWT_SECRET: ci-test-secret-not-real-placeholder-for-testing-only

      - name: Upload SpotBugs SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: target/spotbugs/spotbugs.sarif
          category: spotbugs
        continue-on-error: true

      - name: Upload SpotBugs report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/
          retention-days: 30

  # ── SCA: OWASP Dependency-Check ─────────────────────────────────────────────
  sca-owasp:
    name: SCA - OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: backend-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ hashFiles('pom.xml') }}-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-${{ hashFiles('pom.xml') }}-
            owasp-nvd-

      - name: Run OWASP Dependency-Check
        run: mvn -B dependency-check:check -DskipTests
        continue-on-error: true
        env:
          JWT_SECRET: ci-test-secret-not-real-placeholder-for-testing-only
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report/
          retention-days: 30

  # ── Secret Scan: Gitleaks ───────────────────────────────────────────────────
  scan-secrets:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Upload Gitleaks report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  # ── Container Scan: Trivy ───────────────────────────────────────────────────
  container-scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: backend-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build . -t suliweb-backend:scan

      - name: Trivy scan - backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: suliweb-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Build frontend image for scanning
        run: docker build ./frontend -t suliweb-frontend:scan

      - name: Trivy scan - frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: suliweb-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy SARIF (backend) to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        continue-on-error: true

      - name: Upload Trivy SARIF (frontend) to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        continue-on-error: true

      - name: Upload Trivy reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-backend.sarif
            trivy-frontend.sarif
          retention-days: 30

  # ── Dockerfile Lint: Hadolint ───────────────────────────────────────────────
  hadolint:
    name: Dockerfile Lint - Hadolint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-backend.sarif
          failure-threshold: error
        continue-on-error: true

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-frontend.sarif
          failure-threshold: error
        continue-on-error: true

      - name: Upload Hadolint SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-backend.sarif
          category: hadolint-backend
        continue-on-error: true

      - name: Upload Hadolint reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hadolint-reports
          path: |
            hadolint-backend.sarif
            hadolint-frontend.sarif
          retention-days: 30

  # ── Docker Build + Push to GHCR (master only) ───────────────────────────────
  build-and-push:
    name: Docker Build + Push to GHCR
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-lint-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata - backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata - frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
