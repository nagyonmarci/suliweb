services:

  # ── 1. NAS terhelés monitor ──────────────────────────────────────────────
  nas-monitor:
    build: ./nas-monitor
    container_name: nas-monitor
    restart: always
    environment:
      - NAS_HOST=${NAS_HOST}
      - NAS_USER=${NAS_USER}
      - NAS_PASS=${NAS_PASS}
      - POLL_INTERVAL=15
      - METRICS_PATH=/data/metrics.db
    volumes:
      - ./data:/data
    networks:
      - internal

  # ── 2. Fájl indexer (SHA256, metadata, duplikátum csoportosítás) ─────────
  indexer:
    build: ./indexer
    container_name: nas-indexer
    restart: always
    volumes:
      - /Volumes/nas:/mnt/nas:ro
      - ./data:/data
    environment:
      - SCAN_PATH=/mnt/nas
      - DB_PATH=/data/index.db
      - NAS_HOST=${NAS_HOST}
      - NAS_USER=${NAS_USER}
      - NAS_PASS=${NAS_PASS}
      - MAX_NAS_CPU=50
      - MAX_NAS_TX_MBPS=40
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - POLL_INTERVAL_SECONDS=60
      - RESCAN_DELAY_SECONDS=21600
      - LOG_PATH=/data/indexer.log
    depends_on:
      - nas-monitor
    networks:
      - internal

  # ── 3. PST kinyerő (emailek + csatolmányok) ─────────────────────────────
  pst-extractor:
    build: ./pst-extractor
    container_name: pst-extractor
    restart: always
    volumes:
      - /Volumes/nas:/mnt/nas:ro
      - /Volumes/nas/_extracted:/mnt/extracted    # csatolmányok a NAS-ra
      - ./data:/data
    environment:
      - NAS_HOST=${NAS_HOST}
      - NAS_USER=${NAS_USER}
      - NAS_PASS=${NAS_PASS}
      - DB_PATH=/data/index.db
      - EXTRACTED_BASE=/mnt/extracted
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=50
      - MAX_NAS_TX_MBPS=40
      - POLL_INTERVAL_SECONDS=60
      - LOG_PATH=/data/pst-extractor.log
    depends_on:
      - indexer
    networks:
      - internal

  # ── 4. Embedding + chunking (RAG alapozás) ───────────────────────────────
  embedder:
    build: ./embedder
    container_name: nas-embedder
    restart: always
    volumes:
      - /Volumes/nas:/mnt/nas:ro
      - /Volumes/nas/_extracted:/mnt/extracted:ro
      - ./data:/data
    environment:
      - DB_PATH=/data/index.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=64
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=40
      - MAX_NAS_TX_MBPS=30
      - POLL_INTERVAL_SECONDS=60
      - LOG_PATH=/data/embedder.log
    depends_on:
      - qdrant
      - pst-extractor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  # ── 5. Qdrant vektortároló ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  # ── 6. Dashboard (duplikátum döntés + RAG státusz) ───────────────────────
  dashboard:
    build: ./dashboard
    container_name: nas-dashboard
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - /Volumes/nas/_extracted:/mnt/extracted:ro
    environment:
      - DB_PATH=/data/index.db
      - METRICS_PATH=/data/metrics.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  qdrant_data:
