version: '3.8'

services:
  nas-monitor:
    build: ./nas-monitor
    container_name: nas-monitor
    restart: always
    environment:
      - NAS_HOST=${NAS_HOST}
      - NAS_USER=${NAS_USER}
      - NAS_PASS=${NAS_PASS}
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=50
      - MAX_NAS_TX_MBPS=40
      - POLL_INTERVAL_SECONDS=60
    volumes:
      - ./data:/data
    networks:
      - nas-network

  indexer:
    build: ./indexer
    container_name: indexer
    restart: always
    environment:
      - NAS_HOST=${NAS_HOST}
      - NAS_USER=${NAS_USER}
      - NAS_PASS=${NAS_PASS}
      - DB_PATH=/data/index.db
      - SCAN_PATH=/mnt/nas
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=50
      - MAX_NAS_TX_MBPS=40
      - POLL_INTERVAL_SECONDS=60
      - RESCAN_DELAY_SECONDS=21600
    volumes:
      - ./data:/data
      - /mnt/nas:/mnt/nas:ro
    networks:
      - nas-network

  pst-extractor:
    build: ./pst-extractor
    container_name: pst-extractor
    restart: always
    environment:
      - DB_PATH=/data/index.db
      - EXTRACTED_PATH=/mnt/extracted
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=40
      - MAX_NAS_TX_MBPS=30
      - POLL_INTERVAL_SECONDS=60
      - RESCAN_DELAY_SECONDS=21600
    volumes:
      - ./data:/data
      - /mnt/nas:/mnt/nas:ro
      - /mnt/extracted:/mnt/extracted
    networks:
      - nas-network

  embedder:
    build: ./embedder
    container_name: embedder
    restart: always
    environment:
      - DB_PATH=/data/index.db
      - OLLAMA_HOST=http://host.docker.internal:11434
      - ACTIVE_HOURS_START=22
      - ACTIVE_HOURS_END=6
      - WEEKEND_ALWAYS_ACTIVE=true
      - MAX_NAS_CPU=40
      - MAX_NAS_TX_MBPS=30
      - POLL_INTERVAL_SECONDS=60
      - RESCAN_DELAY_SECONDS=21600
    volumes:
      - ./data:/data
      - /mnt/nas:/mnt/nas:ro
      - /mnt/extracted:/mnt/extracted
    networks:
      - nas-network

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    networks:
      - nas-network

  dashboard:
    build: ./dashboard
    container_name: dashboard
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/index.db
    volumes:
      - ./data:/data
    networks:
      - nas-network

networks:
  nas-network:
    driver: bridge