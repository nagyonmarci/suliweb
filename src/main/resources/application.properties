spring.web.resources.static-locations=classpath:/static/,file:./uploads/
app.pdf.templatePath=form_template.pdf
app.pdf.fontFamily=times.ttf
app.pdf.encoding=Cp1250
app.pdf.fontSize=12
spring.servlet.multipart.max-file-size=100GB
spring.servlet.multipart.max-request-size=100GB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/emails?directConnection=true}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/emails?directConnection=true}
attachments.directory=/app/attachments

# Synology NAS configuration
synology.host=${SYNOLOGY_HOST:}
synology.username=${SYNOLOGY_USERNAME:}
synology.password=${SYNOLOGY_PASSWORD:}
synology.path-prefix=${SYNOLOGY_PATH_PREFIX:/volume1}
synology.local-mount-prefix=${SYNOLOGY_LOCAL_MOUNT_PREFIX:/mnt/nas}
synology.search-extensions=${SYNOLOGY_SEARCH_EXTENSIONS:pst,ost}
synology.batch-size=${SYNOLOGY_BATCH_SIZE:100}

# RAG / Ollama configuration
rag.ollama-base-url=http://localhost:11434
rag.chat-model=llama3.2
rag.chat-context-top-k=8
rag.chat-max-history-turns=6

# e-Discovery (Elasticsearch)
ediscovery.es.url=http://localhost:9200
ediscovery.python.url=http://localhost:8001
ediscovery.ingestion.batch-size=200
ediscovery.ingestion.bulk-size=200
ediscovery.ingestion.python-concurrency=24

# Attachment processing (Elasticsearch, separate from e-Discovery email indexing)
attachment.processing.bulk-size=200
attachment.processing.python-concurrency=24

# Neo4j Knowledge Graph
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:80,http://localhost:4321}
jwt.access-token-expiration-ms=28800000
jwt.refresh-token-expiration-ms=604800000

# Knowledge Graph ingestion tuning
kg.ingestion.batch-size=100
kg.ingestion.max-concurrent-writes=4

# Actuator: csak a health endpoint nyilvĂˇnos, minden mĂˇs tiltva
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.root=info
logging.file.name=logs/app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n