services:
  suliweb-frontend:
    build: ./frontend
    container_name: suliweb-frontend
    restart: unless-stopped
    networks:
      - default
      - web
    depends_on:
      suliweb-backend:
        condition: service_healthy

  suliweb-backend:
    container_name: suliweb-backend
    networks:
      - default
      - web
    build: .
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SYNOLOGY_HOST=${SYNOLOGY_HOST:-}
      - SYNOLOGY_USERNAME=${SYNOLOGY_USERNAME:-}
      - SYNOLOGY_PASSWORD=${SYNOLOGY_PASSWORD:-}
      - SYNOLOGY_PATH_PREFIX=${SYNOLOGY_PATH_PREFIX:-/volume1}
      - SYNOLOGY_LOCAL_MOUNT_PREFIX=${SYNOLOGY_LOCAL_MOUNT_PREFIX:-/mnt/nas}
      - SYNOLOGY_SEARCH_EXTENSIONS=${SYNOLOGY_SEARCH_EXTENSIONS:-pst,ost}
      - SYNOLOGY_BATCH_SIZE=${SYNOLOGY_BATCH_SIZE:-100}
      - "JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env file (run: openssl rand -base64 64)}"
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://suliweb.test,http://localhost:80,http://localhost:4321}
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/emails?directConnection=true
      - RAG_QDRANT_ENABLED=${RAG_QDRANT_ENABLED:-false}
      - RAG_QDRANT_HOST=qdrant
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
    command: ["--spring.profiles.active=docker"]
    volumes:
      - attachments:/app/attachments
      - pst_source:/data/pst_source:ro
      - logs:/app/logs
      - type: bind
        source: /Volumes/archiv
        target: /Volumes/archiv
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Volumes/data
        target: /Volumes/data
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Volumes/eadat
        target: /Volumes/eadat
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Users/fabianm/PSTs
        target: /Users/fabianm/PSTs
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      suliweb-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/progress || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  suliweb-mongo:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: mongo
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-init:
    image: mongodb/mongodb-atlas-local:8.0
    depends_on:
      suliweb-mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh "mongodb://mongo:27017/emails?directConnection=true" --eval '
        db.createCollection("document_chunks");
        // Text index for keyword search lane (hybrid RAG)
        try {
          db.document_chunks.createIndex(
            { content: "text", emailSubject: "text", senderName: "text" },
            { name: "chunk_text_index", weights: { content: 10, emailSubject: 5, senderName: 1 } }
          );
        } catch(e) { print("Text index already exists or failed: " + e); }
        // Vector search index with filter fields for pstFileName and ingestionStatus
        const vectorIndexDef = {
          fields: [
            { type: "vector", numDimensions: 1024, path: "embedding", similarity: "cosine" },
            { type: "filter", path: "pstFileName" },
            { type: "filter", path: "ingestionStatus" }
          ]
        };
        try {
          db.document_chunks.updateSearchIndex("chunk_vector_index", vectorIndexDef);
          print("Vector search index updated with filter fields");
        } catch(e) {
          db.document_chunks.createSearchIndex({
            name: "chunk_vector_index",
            type: "vectorSearch",
            definition: vectorIndexDef
          });
          print("Vector search index created");
        }
      '

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - rag

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - rag

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "ollama pull bge-m3"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    profiles:
      - rag

volumes:
  mongodb_data:
  mongodb_configdb:
  attachments:
  pst_source:
  ollama_data:
  qdrant_data:
  logs:

networks:
  default:
  web:
    external: true
