services:
  suliweb-frontend:
    build: ./frontend
    container_name: suliweb-frontend
    restart: unless-stopped
    networks:
      default:
      web:
        aliases:
          - frontend
    depends_on:
      suliweb-backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /var/run:mode=1777,size=8m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
          pids: 100

  suliweb-backend:
    container_name: suliweb-backend
    networks:
      default:
      web:
        aliases:
          - backend
    build: .
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SYNOLOGY_HOST=${SYNOLOGY_HOST:-}
      - SYNOLOGY_USERNAME=${SYNOLOGY_USERNAME:-}
      - SYNOLOGY_PASSWORD=${SYNOLOGY_PASSWORD:-}
      - SYNOLOGY_PATH_PREFIX=${SYNOLOGY_PATH_PREFIX:-/volume1}
      - SYNOLOGY_LOCAL_MOUNT_PREFIX=${SYNOLOGY_LOCAL_MOUNT_PREFIX:-/mnt/nas}
      - SYNOLOGY_SEARCH_EXTENSIONS=${SYNOLOGY_SEARCH_EXTENSIONS:-pst,ost}
      - SYNOLOGY_BATCH_SIZE=${SYNOLOGY_BATCH_SIZE:-100}
      - "JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env file (run: openssl rand -base64 64)}"
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://suliweb.test,http://localhost:80,http://localhost:4321}
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/emails?directConnection=true
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EDISCOVERY_ES_URL=http://suliweb-elasticsearch:9200
      - EDISCOVERY_PYTHON_URL=http://python-processor:8001
      - NEO4J_URI=bolt://suliweb-neo4j:7687
      - "NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
    command: ["--spring.profiles.active=docker"]
    volumes:
      - attachments:/app/attachments
      - pst_source:/data/pst_source:ro
      - logs:/app/logs
      - type: bind
        source: ${DATA_ROOT:-/Volumes}
        target: ${DATA_ROOT:-/Volumes}
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      suliweb-mongo:
        condition: service_healthy
      suliweb-elasticsearch:
        condition: service_healthy
      suliweb-neo4j:
        condition: service_healthy
      python-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-cp", "/app", "HealthCheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # Spring Boot fat-jar extraction + JVM JIT + Tika temp files
      - /tmp:mode=1777,size=512m
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.00"
          # Virtual threads use carrier threads (~= CPU count), not one thread per task
          pids: 1024

  suliweb-mongo:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: mongo
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.00"
          pids: 512

  suliweb-elasticsearch:
    image: elasticsearch:9.4.2
    container_name: suliweb-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx6g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # 1 GB headroom above the -Xmx6g JVM heap
          memory: 7168M
          cpus: "2.00"
          pids: 4096

  suliweb-neo4j:
    image: neo4j:5.26-community
    container_name: suliweb-neo4j
    restart: unless-stopped
    environment:
      - "NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
      - NEO4J_dbms_security_auth__minimum__password__length=1
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # 1 GB headroom above the 2G JVM heap
          memory: 3072M
          cpus: "2.00"
          pids: 512

  python-processor:
    build: ./python-processor
    container_name: suliweb-python-processor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # markitdown writes temp files during conversion
      - /tmp:mode=1777,size=512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
          pids: 256


volumes:
  mongodb_data:
  mongodb_configdb:
  attachments:
  pst_source:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  logs:

networks:
  default:
  web:
    external: true
