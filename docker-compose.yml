services:
  suliweb-frontend:
    build: ./frontend
    container_name: suliweb-frontend
    restart: unless-stopped
    networks:
      - default
      - web
    depends_on:
      suliweb-backend:
        condition: service_healthy

  suliweb-backend:
    container_name: suliweb-backend
    networks:
      - default
      - web
    build: .
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SYNOLOGY_HOST=${SYNOLOGY_HOST:-}
      - SYNOLOGY_USERNAME=${SYNOLOGY_USERNAME:-}
      - SYNOLOGY_PASSWORD=${SYNOLOGY_PASSWORD:-}
      - SYNOLOGY_PATH_PREFIX=${SYNOLOGY_PATH_PREFIX:-/volume1}
      - SYNOLOGY_LOCAL_MOUNT_PREFIX=${SYNOLOGY_LOCAL_MOUNT_PREFIX:-/mnt/nas}
      - SYNOLOGY_SEARCH_EXTENSIONS=${SYNOLOGY_SEARCH_EXTENSIONS:-pst,ost}
      - SYNOLOGY_BATCH_SIZE=${SYNOLOGY_BATCH_SIZE:-100}
      - "JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env file (run: openssl rand -base64 64)}"
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://suliweb.test,http://localhost:80,http://localhost:4321}
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/emails?directConnection=true
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EDISCOVERY_ES_URL=http://suliweb-elasticsearch:9200
      - EDISCOVERY_PYTHON_URL=http://python-processor:8001
      - NEO4J_URI=bolt://suliweb-neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-suliweb}
    command: ["--spring.profiles.active=docker"]
    volumes:
      - attachments:/app/attachments
      - pst_source:/data/pst_source:ro
      - logs:/app/logs
      - type: bind
        source: /Volumes/archiv
        target: /Volumes/archiv
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Volumes/data
        target: /Volumes/data
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Volumes/eadat
        target: /Volumes/eadat
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /Users/fabianm/PSTs
        target: /Users/fabianm/PSTs
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      suliweb-mongo:
        condition: service_healthy
      suliweb-elasticsearch:
        condition: service_healthy
      suliweb-neo4j:
        condition: service_healthy
      python-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/progress || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  suliweb-mongo:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: mongo
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  suliweb-elasticsearch:
    image: elasticsearch:8.17.0
    container_name: suliweb-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx6g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  suliweb-neo4j:
    image: neo4j:5.26-community
    container_name: suliweb-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-suliweb}
      - NEO4J_dbms_security_auth__minimum__password__length=1
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  python-processor:
    build: ./python-processor
    container_name: suliweb-python-processor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  mongodb_configdb:
  attachments:
  pst_source:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  logs:

networks:
  default:
  web:
    external: true
